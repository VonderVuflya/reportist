services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reportist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reportist}
      POSTGRES_DB: ${POSTGRES_DB:-reportist}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reportist} -d ${POSTGRES_DB:-reportist}"]
      interval: 2s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-reportist-dev-secret}
    volumes:
      - miniodata_dev:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  api:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run --hot src/api.ts"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-reportist}:${POSTGRES_PASSWORD:-reportist}@postgres:5432/${POSTGRES_DB:-reportist}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: http://localhost:${API_PORT:-3000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-5173}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-reportist-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run --hot src/worker.ts"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-reportist}:${POSTGRES_PASSWORD:-reportist}@postgres:5432/${POSTGRES_DB:-reportist}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: http://localhost:${API_PORT:-3000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-5173}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-reportist-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run dev -- --host 0.0.0.0 --port 5173"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:${API_PORT:-3000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  backend_node_modules:
  frontend_node_modules:
  pgdata_dev:
  miniodata_dev:
