services:
  backend:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run --hot src/index.ts"
    environment:
      NODE_ENV: development
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run dev -- --host 0.0.0.0 --port 5173"
    environment:
      NODE_ENV: development
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
