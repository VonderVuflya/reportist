services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reportist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reportist}
      POSTGRES_DB: ${POSTGRES_DB:-reportist}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reportist} -d ${POSTGRES_DB:-reportist}"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-reportist-dev-secret}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-reportist-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY" >/dev/null 2>&1; do
          echo "[minio-init] waiting for minio";
          sleep 1;
        done &&
        mc mb --ignore-existing local/"$$MINIO_BUCKET" &&
        echo "[minio-init] bucket ready: $$MINIO_BUCKET"
    restart: "no"

  api:
    build:
      context: ./backend
    command: ["api"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-reportist}:${POSTGRES_PASSWORD:-reportist}@postgres:5432/${POSTGRES_DB:-reportist}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: http://localhost:${API_PORT:-3000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-5173}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-reportist-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 8s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-reportist}:${POSTGRES_PASSWORD:-reportist}@postgres:5432/${POSTGRES_DB:-reportist}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: http://localhost:${API_PORT:-3000}
      WEB_ORIGIN: http://localhost:${WEB_PORT:-5173}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-reportist-dev-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:${API_PORT:-3000}
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
