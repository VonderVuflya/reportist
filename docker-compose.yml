services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reportist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reportist}
      POSTGRES_DB: ${POSTGRES_DB:-reportist}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reportist} -d ${POSTGRES_DB:-reportist}"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY" >/dev/null 2>&1; do
          echo "[minio-init] waiting for minio";
          sleep 1;
        done &&
        mc mb --ignore-existing local/"$$MINIO_BUCKET" &&
        echo "[minio-init] bucket ready: $$MINIO_BUCKET"
    restart: "no"

  api:
    build:
      context: ./backend
    command: ["api"]
    environment:
      NODE_ENV: production
      # placeholder, credentials substituted from POSTGRES_* env at runtime
      DATABASE_URL: postgres://${POSTGRES_USER:-reportist}:${POSTGRES_PASSWORD:-reportist}@postgres:5432/${POSTGRES_DB:-reportist}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-${SERVICE_FQDN_FRONTEND}}
      WEB_ORIGIN: ${WEB_ORIGIN:-${SERVICE_FQDN_FRONTEND}}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: ["worker"]
    environment:
      NODE_ENV: production
      # placeholder, credentials substituted from POSTGRES_* env at runtime
      DATABASE_URL: postgres://${POSTGRES_USER:-reportist}:${POSTGRES_PASSWORD:-reportist}@postgres:5432/${POSTGRES_DB:-reportist}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-${SERVICE_FQDN_FRONTEND}}
      WEB_ORIGIN: ${WEB_ORIGIN:-${SERVICE_FQDN_FRONTEND}}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-reportist}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Chromium нуждается в seccomp/namespace capabilities — не дропаем
    # их полностью, но запрещаем privilege escalation.
    security_opt:
      - no-new-privileges:true
    mem_limit: 1024m
    cpus: 2.0
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    environment:
      SERVICE_FQDN_FRONTEND_80: ${SERVICE_FQDN_FRONTEND}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
