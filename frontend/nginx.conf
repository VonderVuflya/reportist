server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security: drop version banner
    server_tokens off;

    # Compression for static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # Long-lived cache for Vite hashed assets
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA: fallback to index.html so client-side routing works
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # API reverse proxy → internal backend container.
    # Same-origin so better-auth cookies and SSE just work without CORS.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # SSE compatibility: keep connection open, don't buffer,
        # flush events to the client as soon as worker publishes them.
        proxy_buffering        off;
        proxy_cache            off;
        proxy_request_buffering off;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        chunked_transfer_encoding on;

        # Let backend decide Access-Control-* headers (still correct
        # for same-origin but leaves cross-origin door open if needed).
    }

    # Convenience passthrough so uptime checks hit the same FQDN
    location = /healthz {
        proxy_pass http://api:3000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Prometheus scrape path is internal-only — do not expose publicly.
    location = /metrics {
        return 404;
    }

    # Deny dotfiles just in case something leaks into dist/
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
